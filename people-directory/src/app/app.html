<div class="shell-backdrop">
  <a class="skip-link" href="#main-content">Aller au contenu principal</a>

  <main class="app-shell page-shell">
    <mat-toolbar class="app-header">
      <div class="brand">
        <div class="brand-mark">PD</div>

        <div class="brand-copy">
          <span class="app-name">People Directory</span>
          <span class="app-tagline">Material foundations for a clear CRUD workspace</span>
        </div>
      </div>

      <div class="header-actions">
        <a mat-button routerLink="/persons">Directory</a>
        <a mat-flat-button routerLink="/persons/new">New person</a>
        @if (!securityService.isConnected()) {
          <a mat-button (click)="forceLogin()">Login</a>
        } @else {
          <!-- Menu déroulant -->
          <button mat-button [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
            {{ securityService.user().firstname }} {{ securityService.user().lastname }}
            <mat-icon>arrow_drop_down</mat-icon>
          </button>

          <mat-menu #userMenu="matMenu">
            <button mat-menu-item routerLink="/profile">
              <mat-icon >person</mat-icon>
              <span>Profil</span>
            </button>
            <mat-divider />
            <button mat-menu-item (click)="securityService.logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        }
      </div>
    </mat-toolbar>

    <section id="main-content" class="app-content" tabindex="-1">
      <router-outlet />
    </section>
  </main>
</div>
